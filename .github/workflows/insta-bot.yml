name: BaseKey Ghost Engine - API Gateway V29

on:
  schedule:
    - cron: '0 */6 * * *'      # Har 6 ghante mein chalega
  workflow_dispatch:          # Manual 'Run' button ke liye
  repository_dispatch:        
    types: [start_ghost_automation]

concurrency:
  group: ghost-sync-group
  cancel-in-progress: false

jobs:
  automate:
    # 🔥 TRICK 1: ubuntu-latest ki jagah macos-latest. 
    # Mac cloud IPs ko Instagram jaldi block nahi karta.
    runs-on: macos-latest
    
    timeout-minutes: 30       

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          # 🔥 TRICK 2: Python 3.11 set kiya taaki pichli baar wali 'FutureWarning' na aaye.
          python-version: '3.11'

      - name: 📦 Install Python Packages
        run: |
          pip install -r requirements.txt

      - name: 👻 Run Ghost API Bot (V29)
        run: python bot.py
        env:
          IG_SESSIONID: ${{ secrets.IG_SESSIONID }}
          CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: ✅ Status Check
        if: always()
        run: |
          echo "Ghost V29 API Mission Finished!"
          

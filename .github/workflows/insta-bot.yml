name: BaseKey Ghost Engine - Auto Gateway

on:
  schedule:
    - cron: '0 * * * *'      # Har ghante automatic chalega
  workflow_dispatch:          # Manual button ke liye
  repository_dispatch:        # Vercel Trigger ke liye
    types: [start_ghost_automation]

concurrency:
  group: ghost-sync-group
  cancel-in-progress: false

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 15       

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠️ Install Puppeteer System Deps
        # Puppeteer ko Linux par browser chalane ke liye ye libraries chahiye
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 \
            libasound2t64 libpangocairo-1.0-0 libxss1 libxshmfence1 \
            libu2f-udev libvulkan1

      - name: 📦 Install Project Packages
        run: npm install puppeteer cloudinary firebase-admin

      - name: 👻 Run Ghost Sniper Bot
        run: node bot.js
        env:
          # Yahan Cookies wala secret hata diya h aur login details jodi h
          INSTA_USER: ${{ secrets.INSTA_USER }}
          INSTA_PASS: ${{ secrets.INSTA_PASS }}
          CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}

      - name: ✅ Status Check
        if: success()
        run: echo "Ghost Sync Completed Successfully!"
        
